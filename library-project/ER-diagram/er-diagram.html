<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Management System — ER Diagram</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; color: #1a1a18; }
  p  { font-size: 13px; color: #6b6b66; margin-bottom: 1.5rem; }
  svg { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.10); }
</style>
</head>
<body>
<h1>📚 Library Management System — Entity Relationship Diagram</h1>
<p>Tables: users · books · loans · requests · announcements</p>

<svg viewBox="0 0 900 620" width="900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- ── USERS ── -->
  <rect x="30" y="60" width="190" height="290" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <rect x="30" y="60" width="190" height="36" rx="8" fill="#534AB7"/>
  <rect x="30" y="88" width="190" height="8" fill="#534AB7"/>
  <text x="125" y="83" text-anchor="middle" fill="white" font-size="13" font-weight="600">USERS</text>
  <!-- Fields -->
  <text x="44" y="116" fill="#1a1a18" font-size="11">🔑 id (PK)</text>
  <text x="44" y="134" fill="#1a1a18" font-size="11">  username (unique)</text>
  <text x="44" y="152" fill="#1a1a18" font-size="11">  password_hash</text>
  <text x="44" y="170" fill="#1a1a18" font-size="11">  role (admin|student)</text>
  <text x="44" y="188" fill="#1a1a18" font-size="11">  name</text>
  <text x="44" y="206" fill="#1a1a18" font-size="11">  email (unique)</text>
  <text x="44" y="224" fill="#1a1a18" font-size="11">  phone</text>
  <text x="44" y="242" fill="#1a1a18" font-size="11">  student_id (unique)</text>
  <text x="44" y="260" fill="#1a1a18" font-size="11">  department</text>
  <text x="44" y="278" fill="#1a1a18" font-size="11">  year_of_study</text>
  <text x="44" y="296" fill="#1a1a18" font-size="11">  approved</text>
  <text x="44" y="314" fill="#1a1a18" font-size="11">  self_registered</text>
  <text x="44" y="332" fill="#1a1a18" font-size="11">  joined_at</text>

  <!-- ── BOOKS ── -->
  <rect x="360" y="60" width="185" height="240" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <rect x="360" y="60" width="185" height="36" rx="8" fill="#1D9E75"/>
  <rect x="360" y="88" width="185" height="8" fill="#1D9E75"/>
  <text x="452" y="83" text-anchor="middle" fill="white" font-size="13" font-weight="600">BOOKS</text>
  <text x="374" y="116" fill="#1a1a18" font-size="11">🔑 id (PK)</text>
  <text x="374" y="134" fill="#1a1a18" font-size="11">  title</text>
  <text x="374" y="152" fill="#1a1a18" font-size="11">  author</text>
  <text x="374" y="170" fill="#1a1a18" font-size="11">  genre</text>
  <text x="374" y="188" fill="#1a1a18" font-size="11">  isbn</text>
  <text x="374" y="206" fill="#1a1a18" font-size="11">  published_year</text>
  <text x="374" y="224" fill="#1a1a18" font-size="11">  total_copies</text>
  <text x="374" y="242" fill="#1a1a18" font-size="11">  available_copies</text>
  <text x="374" y="260" fill="#1a1a18" font-size="11">  description</text>
  <text x="374" y="278" fill="#1a1a18" font-size="11">  created_at</text>

  <!-- ── LOANS ── -->
  <rect x="360" y="360" width="185" height="220" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <rect x="360" y="360" width="185" height="36" rx="8" fill="#185FA5"/>
  <rect x="360" y="388" width="185" height="8" fill="#185FA5"/>
  <text x="452" y="383" text-anchor="middle" fill="white" font-size="13" font-weight="600">LOANS</text>
  <text x="374" y="416" fill="#1a1a18" font-size="11">🔑 id (PK)</text>
  <text x="374" y="434" fill="#1a1a18" font-size="11">🔗 book_id (FK → books)</text>
  <text x="374" y="452" fill="#1a1a18" font-size="11">🔗 user_id (FK → users)</text>
  <text x="374" y="470" fill="#1a1a18" font-size="11">  checked_out_at</text>
  <text x="374" y="488" fill="#1a1a18" font-size="11">  due_date</text>
  <text x="374" y="506" fill="#1a1a18" font-size="11">  returned</text>
  <text x="374" y="524" fill="#1a1a18" font-size="11">  returned_on</text>
  <text x="374" y="542" fill="#1a1a18" font-size="11">  fee_paid</text>
  <text x="374" y="560" fill="#1a1a18" font-size="11">  fee_paid_on</text>

  <!-- ── REQUESTS ── -->
  <rect x="680" y="60" width="190" height="240" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <rect x="680" y="60" width="190" height="36" rx="8" fill="#EF9F27"/>
  <rect x="680" y="88" width="190" height="8" fill="#EF9F27"/>
  <text x="775" y="83" text-anchor="middle" fill="white" font-size="13" font-weight="600">REQUESTS</text>
  <text x="694" y="116" fill="#1a1a18" font-size="11">🔑 id (PK)</text>
  <text x="694" y="134" fill="#1a1a18" font-size="11">🔗 book_id (FK → books)</text>
  <text x="694" y="152" fill="#1a1a18" font-size="11">🔗 user_id (FK → users)</text>
  <text x="694" y="170" fill="#1a1a18" font-size="11">  requested_at</text>
  <text x="694" y="188" fill="#1a1a18" font-size="11">  status (pending|…)</text>
  <text x="694" y="206" fill="#1a1a18" font-size="11">  student_note</text>
  <text x="694" y="224" fill="#1a1a18" font-size="11">  admin_note</text>
  <text x="694" y="242" fill="#1a1a18" font-size="11">  reviewed_at</text>

  <!-- ── ANNOUNCEMENTS ── -->
  <rect x="680" y="360" width="190" height="180" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <rect x="680" y="360" width="190" height="36" rx="8" fill="#E24B4A"/>
  <rect x="680" y="388" width="190" height="8" fill="#E24B4A"/>
  <text x="775" y="383" text-anchor="middle" fill="white" font-size="13" font-weight="600">ANNOUNCEMENTS</text>
  <text x="694" y="416" fill="#1a1a18" font-size="11">🔑 id (PK)</text>
  <text x="694" y="434" fill="#1a1a18" font-size="11">  title</text>
  <text x="694" y="452" fill="#1a1a18" font-size="11">  body</text>
  <text x="694" y="470" fill="#1a1a18" font-size="11">🔗 author_id (FK → users)</text>
  <text x="694" y="488" fill="#1a1a18" font-size="11">  pinned</text>
  <text x="694" y="506" fill="#1a1a18" font-size="11">  created_at</text>

  <!-- ── RELATIONSHIPS ── -->

  <!-- USERS → LOANS (1:N): user borrows many loans -->
  <line x1="220" y1="200" x2="360" y2="460" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="268" y="345" fill="#185FA5" font-size="10" font-weight="500">1 borrows N</text>

  <!-- BOOKS → LOANS (1:N): book has many loans -->
  <line x1="452" y1="300" x2="452" y2="360" stroke="#185FA5" stroke-width="1.5"/>
  <text x="460" y="340" fill="#185FA5" font-size="10" font-weight="500">1 : N</text>

  <!-- USERS → REQUESTS (1:N) -->
  <line x1="220" y1="160" x2="680" y2="160" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="430" y="152" fill="#EF9F27" font-size="10" font-weight="500">1 submits N</text>

  <!-- BOOKS → REQUESTS (1:N) -->
  <line x1="545" y1="160" x2="680" y2="160" stroke="#EF9F27" stroke-width="1.5"/>

  <!-- USERS → ANNOUNCEMENTS (1:N) -->
  <line x1="220" y1="100" x2="680" y2="430" stroke="#E24B4A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="400" y="250" fill="#E24B4A" font-size="10" font-weight="500" transform="rotate(-30,400,250)">admin posts</text>

  <!-- Legend -->
  <rect x="30" y="400" width="300" height="80" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="44" y="420" fill="#1a1a18" font-size="12" font-weight="600">Legend</text>
  <line x1="44" y1="437" x2="84" y2="437" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="441" fill="#555" font-size="11">Solid line — direct FK relationship</text>
  <line x1="44" y1="457" x2="84" y2="457" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="90" y="461" fill="#555" font-size="11">Dashed line — logical relationship</text>
  <text x="44" y="477" fill="#555" font-size="11">🔑 Primary Key   🔗 Foreign Key</text>
</svg>

</body>
</html>
